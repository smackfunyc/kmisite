        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Importers of record who paid IEEPA duties are eligible for automatic refunds under the Court of International Trade's March 2026 order. Phase 1 eligibility covers entries that are unliquidated or liquidated within the past 180 days. Entries with AD/CVD orders, warehouse withdrawals, or finally liquidated entries older than 180 days are covered under Phase 2."
        }
      },
      {
        "@type": "Question",
        "name": "What is the difference between Phase 1 and Phase 2 CAPE refunds?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Phase 1 launched April 20, 2026 and covers standard formal and informal entries that are unliquidated or liquidated within 180 days via the CAPE portal in ACE. Phase 2 covers finally liquidated entries (more than 180 days old), AD/CVD entries, and warehouse withdrawals — processed in a later rollout pending a separate CBP announcement."
        }
      },
      {
        "@type": "Question",
        "name": "How do I use the CAPE portal to submit my IEEPA refund claim?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Log in to your ACE Secure Data Portal and navigate to the CAPE Claim Portal tab. Compile a CSV listing all affected entry numbers with their IEEPA-specific HTS codes, upload the file, and submit. The system runs real-time validation and returns a confirmation status. Errors must be corrected and resubmitted."
        }
      },
      {
        "@type": "Question",
        "name": "Will I receive interest on my IEEPA duty refund?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. CBP calculates interest on the refunded amount at the IRS corporate overpayment rate, currently 6%. Interest accrues from the original date of payment through the date CBP finalizes reliquidation on the affected entries."
        }
      },
      {
        "@type": "Question",
        "name": "How do I know if my entries were finally liquidated?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "An entry is finally liquidated when all protest rights have expired and the liquidation date is more than 180 days in the past. Verify liquidation status in your ACE account under entry summary records, or contact your licensed customs broker."
        }
      },
      {
        "@type": "Question",
        "name": "How long does it take to receive a CAPE refund?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Most validated CAPE claims are expected to be processed within 45 days of submission. Funds are deposited directly into your ACH-authorized bank account once CBP completes reliquidation."
        }
      },
      {
        "@type": "Question",
        "name": "What should I do if my IEEPA refund is not automatic?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Verify your ACE account has active ACH enrollment and current banking details — refunds to unenrolled accounts are rejected. If your CSV upload failed validation, correct any formatting errors or entry number discrepancies and resubmit. Maintaining your processing queue position requires a successful resubmission."
        }
      },
      {
        "@type": "Question",
        "name": "Can I claim a refund if I was not the original importer of record?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "No. CAPE refund eligibility is tied to the importer of record (IOR) named on the original CBP entry summary. Only the party designated as IOR at time of entry is entitled to claim the IEEPA duty refund, regardless of any subsequent change in goods ownership."
        }
      }
